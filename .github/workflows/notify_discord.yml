name: Notify Discord

on:
  push:
    branches: ['**']   # all branches

jobs:
  discord:
    runs-on: ubuntu-latest
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Notify on push
        run: |
          # Extract recent commit messages (up to 5)
          COMMITS=$(jq -r '.commits[] | "- \(.author.name): \(.message | gsub("\r";"") | split("\n")[0]) ([view](\(.url)))"' "$GITHUB_EVENT_PATH" | head -n 5)
          [ -z "$COMMITS" ] && COMMITS="- (no commit list available)"

          # Create base JSON
          cat > payload.json <<'JSON'
          {
            "username": "GitHub",
            "content": ""
          }
          JSON

          # Build content string
          BRANCH="${GITHUB_REF#refs/heads/}"
          CONTENT="📢 New push to **${GITHUB_REPOSITORY}** on \`${BRANCH}\` by **${GITHUB_ACTOR}**\nLatest: [\`${GITHUB_SHA}\`](https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})"

          # Inject commit list as embed
          jq --arg content "$CONTENT" \
             --arg desc "$COMMITS" \
             '.content = $content | .embeds = [ { "title": "Recent commits (up to 5)", "description": $desc } ]' \
             payload.json > payload.final.json

          # Send to Discord
          curl -sS --fail -H "Content-Type: application/json" \
               -d @payload.final.json \
               "${{ secrets.DISCORD_WEBHOOK }}"
